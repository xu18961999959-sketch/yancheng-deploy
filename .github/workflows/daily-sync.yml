name: Daily Notion Sync & Deploy

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Pull Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python scripts/sync_notion.py
      - name: Build JS data files
        run: python scripts/build_js_data.py
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add webapp/data/recruitment.js webapp/data/soe.js
          git diff --staged --quiet || git commit -m "chore: sync Notion data $(date +'%Y-%m-%d')"
          git push
